services:

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - proxyweb-test

  mysql2:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb2
    volumes:
      - ./mysql/init2.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - proxyweb-test

  proxysql:
    image: proxysql/proxysql:2.7.1
    volumes:
      - ./proxysql/proxysql.cnf:/etc/proxysql.cnf
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 6032 -u radmin -pradmin -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15
    ports:
      - "6032:6032"   # admin interface (useful for manual inspection)
      - "6033:6033"   # mysql frontend
    networks:
      - proxyweb-test

  proxysql-init:
    image: mysql:8.0
    command: >
      bash -c "mysql -h proxysql -P 6032 -u radmin -pradmin < /init.sql"
    volumes:
      - ./proxysql/init.sql:/init.sql
    depends_on:
      proxysql:
        condition: service_healthy
    networks:
      - proxyweb-test
    restart: "no"

  proxysql2:
    image: proxysql/proxysql:2.7.1
    volumes:
      - ./proxysql/proxysql2.cnf:/etc/proxysql.cnf
    depends_on:
      mysql2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 6032 -u radmin -pradmin -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15
    ports:
      - "6034:6032"   # admin interface for proxysql2
      - "6035:6033"   # mysql frontend for proxysql2
    networks:
      - proxyweb-test

  proxysql2-init:
    image: mysql:8.0
    command: >
      bash -c "mysql -h proxysql2 -P 6032 -u radmin -pradmin < /init.sql"
    volumes:
      - ./proxysql/init2.sql:/init.sql
    depends_on:
      proxysql2:
        condition: service_healthy
    networks:
      - proxyweb-test
    restart: "no"

  proxyweb:
    build:
      context: ..
      dockerfile: test/Dockerfile
    volumes:
      - ./config/config.yml:/app/config/config.yml
    depends_on:
      proxysql-init:
        condition: service_completed_successfully
      proxysql2-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "5000:5000"
    networks:
      - proxyweb-test

networks:
  proxyweb-test:
    driver: bridge
